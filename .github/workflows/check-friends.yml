name: 友链自动同步 + 双向检测

on:
  schedule:
    # 每天北京时间凌晨 3 点 (UTC 19:00)
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  discussions: read

jobs:
  sync-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 同步友链申请（从 Giscus Discussion 抓取）
        run: node scripts/sync-friends.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 双向检测（验证对方是否还挂着我方链接）
        run: node scripts/check-links.js

      - name: 提交变更
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 自动同步友链 + 状态更新"
          file_pattern: src/data/links.json
